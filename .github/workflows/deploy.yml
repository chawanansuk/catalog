name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# สิทธิ์ที่จำเป็นสำหรับ deploy ขึ้น Pages
permissions:
  contents: read
  pages: write
  id-token: write

# ให้ deploy ทีละครั้ง ไม่ทับซ้อนกัน
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        # BASE_PATH = /<ชื่อ repo> เพราะ GitHub Pages โฮสต์ที่ /<repo>/
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
